<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>PerspectiveGrid Pro - Mobile Optimized</title>
    <style>
        /* Förhindrar scrolling när man ritar */
        body { margin: 0; overflow: hidden; background: #f0f2f5; font-family: sans-serif; touch-action: none; }
        canvas { display: block; background: white; touch-action: none; }
        
        .ui { position: absolute; top: 10px; left: 10px; display: flex; flex-direction: column; gap: 8px; pointer-events: none; width: 220px; max-width: 90vw; }
        .panel { background: white; padding: 12px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); pointer-events: all; }
        
        h1 { font-size: 14px; margin: 0 0 5px 0; }
        label { display: block; font-size: 9px; font-weight: bold; margin: 8px 0 2px; color: #888; text-transform: uppercase; }
        input[type="range"] { width: 100%; height: 25px; } /* Större träffyta för fingrar */
        
        .btn-group { display: flex; gap: 4px; margin-top: 5px; }
        button { flex: 1; padding: 12px 5px; cursor: pointer; border: none; border-radius: 5px; font-weight: bold; font-size: 10px; }
        
        #addBtn { background: #2ed573; color: white; }
        #delBtn { background: #ff4757; color: white; opacity: 0.2; }
        #delBtn.active { opacity: 1; }
        .accent-btn { background: #3498db; color: white; width: 100%; margin-top: 5px; }
        #dlBtn { background: #2f3542; color: white; width: 100%; margin-top: 5px; }
    </style>
</head>
<body>

<div class="ui">
    <div class="panel">
        <h1>PerspectiveGrid Pro</h1>
        <label>Sun Direction</label>
        <input type="range" id="sunSld" min="0" max="360" value="180">
        <button id="normBtn" class="accent-btn">Normalize View</button>
    </div>
    
    <div class="panel">
        <label>Size / Height / Rotation</label>
        <input type="range" id="sizeSld" min="20" max="350" value="80">
        <input type="range" id="heightSld" min="10" max="250" value="60">
        <input type="range" id="rotSld" min="0" max="360" value="45">
        
        <div class="btn-group">
            <button id="addBtn">Add</button>
            <button id="delBtn" disabled>Delete</button>
        </div>
        <button id="dlBtn">Download PNG</button>
    </div>
</div>

<canvas id="cvs"></canvas>

<script>
const canvas = document.getElementById('cvs'), ctx = canvas.getContext('2d');
const sizeSld = document.getElementById('sizeSld'), heightSld = document.getElementById('heightSld');
const rotSld = document.getElementById('rotSld'), sunSld = document.getElementById('sunSld');
const addBtn = document.getElementById('addBtn'), delBtn = document.getElementById('delBtn');
const normBtn = document.getElementById('normBtn'), dlBtn = document.getElementById('dlBtn');

let width, height, activeObj = null, selectedHouse = null;
const state = { vpL: { x: 50, y: 300, isVP: true }, vpR: { x: 300, y: 300, isVP: true }, houses: [] };

function init() {
    window.addEventListener('resize', resize);
    
    // MUS-HÄNDELSER
    canvas.addEventListener('mousedown', (e) => handleStart(e.clientX, e.clientY));
    window.addEventListener('mousemove', (e) => handleMove(e.clientX, e.clientY));
    window.addEventListener('mouseup', () => activeObj = null);
    
    // TOUCH-HÄNDELSER (MOBIL)
    canvas.addEventListener('touchstart', (e) => {
        const touch = e.touches[0];
        handleStart(touch.clientX, touch.clientY);
        e.preventDefault();
    }, {passive: false});
    
    window.addEventListener('touchmove', (e) => {
        const touch = e.touches[0];
        handleMove(touch.clientX, touch.clientY);
        e.preventDefault();
    }, {passive: false});
    
    window.addEventListener('touchend', () => activeObj = null);

    addBtn.onclick = () => {
        const h = { x: width/2, y: height/2 + 50, size: 80, h: 60, rot: 45 };
        state.houses.push(h); select(h); draw();
    };

    delBtn.onclick = () => { if(selectedHouse) { state.houses = state.houses.filter(h => h !== selectedHouse); select(null); draw(); } };
    normBtn.onclick = () => { state.vpL.x = -width; state.vpR.x = width*2; draw(); };
    dlBtn.onclick = () => { draw(true); const a = document.createElement('a'); a.download = 'sketch.png'; a.href = canvas.toDataURL(); a.click(); draw(false); };
    
    [sizeSld, heightSld, rotSld, sunSld].forEach(el => el.oninput = () => {
        if(selectedHouse) {
            selectedHouse.size = parseInt(sizeSld.value);
            selectedHouse.h = parseInt(heightSld.value);
            selectedHouse.rot = parseInt(rotSld.value);
        }
        draw();
    });

    resize();
    if(state.houses.length === 0) addBtn.onclick();
}

function handleStart(mx, my) {
    const r = canvas.getBoundingClientRect();
    const x = mx - r.left, y = my - r.top;
    activeObj = null;
    [state.vpL, state.vpR].forEach(v => { if(Math.hypot(v.x-x, v.y-y) < 30) activeObj = v; });
    const sorted = [...state.houses].sort((a, b) => b.y - a.y);
    for(let h of sorted) { if(Math.hypot(h.x-x, h.y-y) < 30) { activeObj = h; select(h); break; } }
    if(!activeObj) select(null);
    draw();
}

function handleMove(mx, my) {
    if(!activeObj) return;
    const r = canvas.getBoundingClientRect();
    activeObj.x = mx - r.left; activeObj.y = my - r.top;
    if(activeObj.isVP) state.vpL.y = state.vpR.y = activeObj.y;
    draw();
}

function select(h) {
    selectedHouse = h;
    if(h) {
        sizeSld.value = h.size; heightSld.value = h.h; rotSld.value = h.rot;
        delBtn.disabled = false; delBtn.classList.add('active');
    } else {
        delBtn.disabled = true; delBtn.classList.remove('active');
    }
}

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    state.vpR.x = width - 50;
    draw();
}

function getP(p, vp, tx) { return { x: tx, y: p.y + (vp.y - p.y) / (vp.x - p.x) * (tx - p.x) }; }

function draw(clean = false) {
    ctx.clearRect(0, 0, width, height);
    const sunAngleRad = (parseInt(sunSld.value) * Math.PI) / 180;
    ctx.strokeStyle = "#ddd";
    ctx.beginPath(); ctx.moveTo(0, state.vpL.y); ctx.lineTo(width, state.vpR.y); ctx.stroke();

    const sorted = [...state.houses].sort((a, b) => a.y - b.y);
    sorted.forEach(h => {
        const isSel = (h === selectedHouse && !clean);
        const rotRad = (h.rot * Math.PI) / 180;
        const bMid = { x: h.x, y: h.y };
        const xL = h.x - h.size * Math.cos(rotRad), xR = h.x + h.size * Math.sin(rotRad);
        const bL = getP(bMid, state.vpL, xL), bR = getP(bMid, state.vpR, xR);
        const bBack = { x: bL.x + (bR.x - bMid.x), y: bL.y + (bR.y - bMid.y) };
        const tMid = { x: bMid.x, y: bMid.y - h.h }, tL = { x: bL.x, y: bL.y - h.h };
        const tR = { x: bR.x, y: bR.y - h.h }, tBack = { x: bBack.x, y: bBack.y - h.h };

        const drawFace = (p1, p2, p3, p4, offset) => {
            const diff = Math.cos(rotRad + offset - sunAngleRad);
            ctx.fillStyle = diff > 0 ? "#eeeeee" : "#999999"; 
            ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
            ctx.lineTo(p3.x, p3.y); ctx.lineTo(p4.x, p4.y); ctx.closePath();
            ctx.fill(); ctx.strokeStyle = "#333"; ctx.lineWidth = isSel ? 3 : 1; ctx.stroke();
        };

        drawFace(bL, bBack, tBack, tL, -Math.PI/2); drawFace(bR, bBack, tBack, tR, 0);          
        drawFace(bMid, bL, tL, tMid, Math.PI); drawFace(bMid, bR, tR, tMid, Math.PI/2);    

        const tPeak = { x: (tL.x + tR.x)/2, y: (tL.y + tR.y)/2 - h.h*0.6 };
        ctx.fillStyle = "rgba(245,245,245,0.7)";
        ctx.beginPath(); ctx.moveTo(tL.x, tL.y); ctx.lineTo(tPeak.x, tPeak.y); ctx.lineTo(tMid.x, tMid.y);
        ctx.lineTo(tR.x, tR.y); ctx.lineTo(tBack.x, tBack.y); ctx.lineTo(tPeak.x, tPeak.y);
        ctx.closePath(); ctx.fill(); ctx.stroke();

        if(!clean) {
            ctx.fillStyle = isSel ? "#000" : "#2ed573";
            ctx.beginPath(); ctx.arc(h.x, h.y, 12, 0, 7); ctx.fill(); // Större punkt för touch
        }
    });

    if(!clean) {
        ctx.fillStyle = "#ff4757";
        [state.vpL, state.vpR].forEach(v => {
            if(v.x > 0 && v.x < width) { ctx.beginPath(); ctx.arc(v.x, v.y, 15, 0, 7); ctx.fill(); }
        });
    }
}

init();
</script>
</body>
</html>
