<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Perspective Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ui-container">
    <div class="panel info">
        <h1>Perspective Helper</h1>
        <p><span class="dot red"></span> Drag <b>Red Dots</b> for Horizon/VP</p>
        <p><span class="dot green"></span> Drag <b>Green Dots</b> to move Cottages</p>
    </div>

    <div class="panel settings">
        <div class="control">
            <label>Cottage Scale</label>
            <input type="range" id="sizeSlider" min="20" max="150" value="70">
        </div>
        <div class="control">
            <label>Wall Height</label>
            <input type="range" id="heightSlider" min="10" max="150" value="60">
        </div>
        <div class="control">
            <label>Grid Opacity</label>
            <input type="range" id="alphaSlider" min="10" max="100" value="50">
        </div>
    </div>
</div>

<canvas id="perspectiveCanvas"></canvas>

<script src="script.js"></script>
</body>
</html>
