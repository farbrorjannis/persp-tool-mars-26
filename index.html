<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artist Perspective Tool - Natural View & Sun</title>
    <style>
        body { margin: 0; overflow: hidden; background: #f0f2f5; font-family: sans-serif; }
        canvas { display: block; background: white; cursor: crosshair; }
        .ui { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 8px; pointer-events: none; width: 260px; }
        .panel { background: white; padding: 12px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); pointer-events: all; }
        h1 { font-size: 14px; margin: 0 0 8px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        label { display: block; font-size: 10px; font-weight: bold; margin: 8px 0 3px; color: #666; text-transform: uppercase; }
        input[type="range"] { width: 100%; cursor: pointer; }
        .btn-group { display: flex; gap: 4px; margin-top: 5px; }
        button { flex: 1; padding: 8px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; font-size: 10px; transition: 0.2s; }
        #addBtn { background: #2ed573; color: white; }
        #delBtn { background: #ff4757; color: white; opacity: 0.3; }
        #delBtn.active { opacity: 1; }
        .norm-btn { background: #3498db; color: white; width: 100%; margin-top: 5px; }
        .reset-btn { background: #7f8c8d; color: white; width: 100%; margin-top: 5px; }
        #dlBtn { background: #2f3542; color: white; width: 100%; margin-top: 5px; }
        .info-text { font-size: 10px; color: #7f8c8d; line-height: 1.3; margin-top: 8px; }
    </style>
</head>
<body>

<div class="ui">
    <div class="panel">
        <h1>Global Controls</h1>
        <label>Sun Direction</label>
        <input type="range" id="sunSld" min="0" max="360" value="180">
        <button id="normBtn" class="norm-btn">Normalize (Natural View)</button>
        <button id="resetBtn" class="reset-btn">Reset (Bring Points Back)</button>
        <p class="info-text"><b>Normalize:</b> Pushes points outside for a calm, realistic look. Human eyes hate "pointy" buildings!</p>
    </div>
    
    <div class="panel">
        <h1>Cottage Settings</h1>
        <label>Size / Height</label>
        <input type="range" id="sizeSld" min="20" max="350" value="80">
        <input type="range" id="heightSld" min="10" max="250" value="60">
        <label>Rotation (360°)</label>
        <input type="range" id="rotSld" min="0" max="360" value="45">
        <div class="btn-group">
            <button id="addBtn">Add</button>
            <button id="delBtn" disabled>Delete</button>
        </div>
        <button id="dlBtn">Download Image</button>
    </div>
</div>

<canvas id="cvs"></canvas>

<script>
const canvas = document.getElementById('cvs'), ctx = canvas.getContext('2d');
const sizeSld = document.getElementById('sizeSld'), heightSld = document.getElementById('heightSld');
const rotSld = document.getElementById('rotSld'), sunSld = document.getElementById('sunSld');
const addBtn = document.getElementById('addBtn'), delBtn = document.getElementById('delBtn');
const normBtn = document.getElementById('normBtn'), resetBtn = document.getElementById('resetBtn');
const dlBtn = document.getElementById('dlBtn');

let width, height, activeObj = null, selectedHouse = null;
const state = { vpL: { x: 100, y: 350, isVP: true }, vpR: { x: 900, y: 350, isVP: true }, houses: [] };

function init() {
    window.addEventListener('resize', resize);
    canvas.addEventListener('mousedown', start);
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', () => activeObj = null);
    
    addBtn.onclick = () => {
        const h = { x: width/2, y: height/2 + 100, size: 80, h: 60, rot: 45 };
        state.houses.push(h); select(h); draw();
    };

    delBtn.onclick = () => { if(selectedHouse) { state.houses = state.houses.filter(h => h !== selectedHouse); select(null); draw(); } };
    
    normBtn.onclick = () => {
        state.vpL.x = -800; state.vpR.x = width + 800;
        state.vpL.y = state.vpR.y = height * 0.4;
        draw();
    };

    resetBtn.onclick = () => {
        state.vpL.x = 100; state.vpR.x = width - 100;
        state.vpL.y = state.vpR.y = height * 0.4;
        draw();
    };

    dlBtn.onclick = () => { draw(true); const a = document.createElement('a'); a.download = 'sketch.png'; a.href = canvas.toDataURL(); a.click(); draw(false); };
    
    [sizeSld, heightSld, rotSld, sunSld].forEach(el => el.oninput = () => {
        if(selectedHouse) {
            selectedHouse.size = parseInt(sizeSld.value);
            selectedHouse.h = parseInt(heightSld.value);
            selectedHouse.rot = parseInt(rotSld.value);
        }
        draw();
    });

    resize();
    resetBtn.onclick(); 
    addBtn.onclick();
}

function select(h) {
    selectedHouse = h;
    if(h) {
        sizeSld.value = h.size; heightSld.value = h.h; rotSld.value = h.rot;
        delBtn.disabled = false; delBtn.classList.add('active');
    } else {
        delBtn.disabled = true; delBtn.classList.remove('active');
    }
}

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    draw();
}

function getP(p, vp, tx) { return { x: tx, y: p.y + (vp.y - p.y) / (vp.x - p.x) * (tx - p.x) }; }

function draw(clean = false) {
    ctx.clearRect(0, 0, width, height);
    const sunAngleRad = (parseInt(sunSld.value) * Math.PI) / 180;

    // Sun Visual
    if(!clean) {
        const sX = width/2 + Math.cos(sunAngleRad) * 200;
        const sY = state.vpL.y - 120 + Math.sin(sunAngleRad) * 40;
        ctx.fillStyle = "#FFD700"; ctx.beginPath(); ctx.arc(sX, sY, 15, 0, 7); ctx.fill();
        ctx.strokeStyle = "rgba(255,215,0,0.3)"; ctx.setLineDash([5,5]);
        ctx.beginPath(); ctx.moveTo(sX, sY); ctx.lineTo(width/2, height/2); ctx.stroke(); ctx.setLineDash([]);
    }

    // Horizon
    ctx.strokeStyle = "#ddd";
    ctx.beginPath(); ctx.moveTo(0, state.vpL.y); ctx.lineTo(width, state.vpR.y); ctx.stroke();

    const sortedHouses = [...state.houses].sort((a, b) => a.y - b.y);

    sortedHouses.forEach(h => {
        const isSel = (h === selectedHouse && !clean);
        const rotRad = (h.rot * Math.PI) / 180;
        const bMid = { x: h.x, y: h.y };
        const xL = h.x - h.size * Math.cos(rotRad);
        const xR = h.x + h.size * Math.sin(rotRad);
        const bL = getP(bMid, state.vpL, xL);
        const bR = getP(bMid, state.vpR, xR);
        const bBack = { x: bL.x + (bR.x - bMid.x), y: bL.y + (bR.y - bMid.y) };

        const tMid = { x: bMid.x, y: bMid.y - h.h };
        const tL = { x: bL.x, y: bL.y - h.h };
        const tR = { x: bR.x, y: bR.y - h.h };
        const tBack = { x: bBack.x, y: bBack.y - h.h };

        const drawFace = (p1, p2, p3, p4, wallAngleOffset) => {
            const diff = Math.cos(rotRad + wallAngleOffset - sunAngleRad);
            ctx.fillStyle = diff > 0 ? "#e0e0e0" : "#606060"; 
            ctx.beginPath(); ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
            ctx.lineTo(p3.x, p3.y); ctx.lineTo(p4.x, p4.y); ctx.closePath();
            ctx.fill(); ctx.strokeStyle = "#333"; ctx.lineWidth = isSel ? 3 : 1; ctx.stroke();
        };

        drawFace(bL, bBack, tBack, tL, -Math.PI/2); 
        drawFace(bR, bBack, tBack, tR, 0);          
        drawFace(bMid, bL, tL, tMid, Math.PI);      
        drawFace(bMid, bR, tR, tMid, Math.PI/2);    

        // Wireframe Roof
        const tPeak = { x: (tL.x + tR.x)/2, y: (tL.y + tR.y)/2 - h.h*0.6 };
        ctx.fillStyle = "rgba(240,240,240,0.5)";
        ctx.beginPath(); ctx.moveTo(tL.x, tL.y); ctx.lineTo(tPeak.x, tPeak.y); ctx.lineTo(tMid.x, tMid.y);
        ctx.lineTo(tR.x, tR.y); ctx.lineTo(tBack.x, tBack.y); ctx.lineTo(tPeak.x, tPeak.y);
        ctx.closePath(); ctx.fill(); ctx.stroke();

        if(!clean) {
            ctx.fillStyle = isSel ? "#000" : "#2ed573";
            ctx.beginPath(); ctx.arc(h.x, h.y, 8, 0, 7); ctx.fill();
        }
    });

    if(!clean) {
        ctx.fillStyle = "#ff4757";
        [state.vpL, state.vpR].forEach(v => {
            if(v.x > 0 && v.x < width) { ctx.beginPath(); ctx.arc(v.x, v.y, 10, 0, 7); ctx.fill(); }
        });
    }
}

function start(e) {
    const r = canvas.getBoundingClientRect(), mx = e.clientX-r.left, my = e.clientY-r.top;
    activeObj = null;
    [state.vpL, state.vpR].forEach(v => { if(Math.hypot(v.x-mx, v.y-my) < 25) activeObj = v; });
    const sorted = [...state.houses].sort((a, b) => b.y - a.y);
    for(let h of sorted) { if(Math.hypot(h.x-mx, h.y-my) < 25) { activeObj = h; select(h); break; } }
    if(!activeObj) select(null);
    draw();
}

function move(e) {
    if(!activeObj) return;
    const r = canvas.getBoundingClientRect();
    activeObj.x = e.clientX-r.left; activeObj.y = e.clientY-r.top;
    if(activeObj.isVP) state.vpL.y = state.vpR.y = activeObj.y;
    draw();
}

init();
</script>
</body>
</html>
