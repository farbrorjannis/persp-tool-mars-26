<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Artist Perspective Tool - Depth & Occlusion</title>
    <style>
        body { margin: 0; overflow: hidden; background: #f0f2f5; font-family: sans-serif; }
        canvas { display: block; background: white; cursor: crosshair; }
        .ui { position: absolute; top: 20px; left: 20px; display: flex; flex-direction: column; gap: 10px; pointer-events: none; width: 250px; }
        .panel { background: white; padding: 15px; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); pointer-events: all; }
        h1 { font-size: 16px; margin: 0 0 10px 0; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        label { display: block; font-size: 11px; font-weight: bold; margin: 8px 0 3px; color: #666; text-transform: uppercase; }
        input[type="range"] { width: 100%; cursor: pointer; }
        .btn-group { display: flex; gap: 5px; margin-top: 10px; }
        button { flex: 1; padding: 10px; cursor: pointer; border: none; border-radius: 4px; font-weight: bold; font-size: 11px; transition: 0.2s; }
        #addBtn { background: #2ed573; color: white; }
        #delBtn { background: #ff4757; color: white; opacity: 0.3; cursor: not-allowed; }
        #delBtn.active { opacity: 1; cursor: pointer; }
        #dlBtn { background: #3498db; color: white; width: 100%; margin-top: 5px; }
        .status { font-size: 11px; color: #888; text-align: center; margin-top: 8px; }
    </style>
</head>
<body>

<div class="ui">
    <div class="panel">
        <h1>Global Settings</h1>
        <label>Sun Direction</label>
        <input type="range" id="sunSld" min="0" max="360" value="180">
        <button id="dlBtn">Download Sketch</button>
    </div>
    
    <div class="panel">
        <h1>Cottage Settings</h1>
        <label>Size & Height</label>
        <input type="range" id="sizeSld" min="20" max="300" value="80">
        <input type="range" id="heightSld" min="10" max="200" value="60">
        <label>Rotation (360°)</label>
        <input type="range" id="rotSld" min="0" max="360" value="45">
        
        <div class="btn-group">
            <button id="addBtn">Add New</button>
            <button id="delBtn" disabled>Delete</button>
        </div>
        <p id="status" class="status">Select a green anchor</p>
    </div>
</div>

<canvas id="cvs"></canvas>

<script>
const canvas = document.getElementById('cvs'), ctx = canvas.getContext('2d');
const sizeSld = document.getElementById('sizeSld'), heightSld = document.getElementById('heightSld');
const rotSld = document.getElementById('rotSld'), sunSld = document.getElementById('sunSld');
const addBtn = document.getElementById('addBtn'), delBtn = document.getElementById('delBtn');
const dlBtn = document.getElementById('dlBtn'), statusTxt = document.getElementById('status');

let width, height, activeObj = null, selectedHouse = null;
const state = { vpL: { x: 150, y: 350, isVP: true }, vpR: { x: 1000, y: 350, isVP: true }, houses: [] };

function init() {
    window.addEventListener('resize', resize);
    canvas.addEventListener('mousedown', start);
    window.addEventListener('mousemove', move);
    window.addEventListener('mouseup', () => activeObj = null);
    
    addBtn.onclick = () => {
        const h = { x: width/2, y: height/2 + 50, size: 80, h: 60, rot: 45 };
        state.houses.push(h); select(h); draw();
    };

    delBtn.onclick = () => { if(selectedHouse) { state.houses = state.houses.filter(h => h !== selectedHouse); select(null); draw(); } };
    dlBtn.onclick = () => { draw(true); const a = document.createElement('a'); a.download = 'sketch.png'; a.href = canvas.toDataURL(); a.click(); draw(false); };

    [sizeSld, heightSld, rotSld, sunSld].forEach(s => s.oninput = () => {
        if(selectedHouse) {
            selectedHouse.size = parseInt(sizeSld.value);
            selectedHouse.h = parseInt(heightSld.value);
            selectedHouse.rot = parseInt(rotSld.value);
        }
        draw();
    });

    resize();
    state.houses.push({ x: width * 0.4, y: height * 0.6, size: 100, h: 70, rot: 35 });
    state.houses.push({ x: width * 0.5, y: height * 0.8, size: 120, h: 80, rot: 15 });
    draw();
}

function select(h) {
    selectedHouse = h;
    if(h) {
        sizeSld.value = h.size; heightSld.value = h.h; rotSld.value = h.rot;
        delBtn.disabled = false; delBtn.classList.add('active');
        statusTxt.innerText = "Cottage Selected";
    } else {
        delBtn.disabled = true; delBtn.classList.remove('active');
        statusTxt.innerText = "Select a green anchor";
    }
}

function resize() {
    width = canvas.width = window.innerWidth;
    height = canvas.height = window.innerHeight;
    state.vpR.x = width - 150;
    draw();
}

function getP(p, vp, tx) { return { x: tx, y: p.y + (vp.y - p.y) / (vp.x - p.x) * (tx - p.x) }; }

function draw(clean = false) {
    ctx.clearRect(0, 0, width, height);
    ctx.strokeStyle = "#ddd";
    ctx.beginPath(); ctx.moveTo(0, state.vpL.y); ctx.lineTo(width, state.vpR.y); ctx.stroke();

    const sunAngle = (parseInt(sunSld.value) * Math.PI) / 180;

    // SORTERING: Rita de som har lägst Y först (längst bort)
    const sortedHouses = [...state.houses].sort((a, b) => a.y - b.y);

    sortedHouses.forEach(h => {
        const isSel = (h === selectedHouse && !clean);
        const rotRad = (h.rot * Math.PI) / 180;
        
        const bMid = { x: h.x, y: h.y };
        const xL = h.x - h.size * Math.cos(rotRad);
        const xR = h.x + h.size * Math.sin(rotRad);
        
        const bL = getP(bMid, state.vpL, xL);
        const bR = getP(bMid, state.vpR, xR);
        const bBack = { x: bL.x + (bR.x - bMid.x), y: bL.y + (bR.y - bMid.y) };

        const tMid = { x: bMid.x, y: bMid.y - h.h };
        const tL = { x: bL.x, y: bL.y - h.h };
        const tR = { x: bR.x, y: bR.y - h.h };
        const tBack = { x: bBack.x, y: bBack.y - h.h };

        const drawFace = (p1, p2, p3, p4, wallAngleOffset) => {
            const wallAngle = rotRad + wallAngleOffset;
            const diff = Math.cos(wallAngle - sunAngle);
            const shade = diff > 0 ? "#e0e0e0" : "#606060"; 

            ctx.fillStyle = shade;
            ctx.beginPath();
            ctx.moveTo(p1.x, p1.y); ctx.lineTo(p2.x, p2.y);
            ctx.lineTo(p3.x, p3.y); ctx.lineTo(p4.x, p4.y);
            ctx.closePath();
            ctx.fill();
            ctx.strokeStyle = "#333";
            ctx.lineWidth = isSel ? 3 : 1;
            ctx.stroke();
        };

        // RITA VÄGGAR: Vi ritar de bakre väggarna först inuti objektet
        // (Enkel backface culling/sorting för varje enskilt hus)
        drawFace(bL, bBack, tBack, tL, -Math.PI/2); 
        drawFace(bR, bBack, tBack, tR, 0);          
        drawFace(bMid, bL, tL, tMid, Math.PI);      
        drawFace(bMid, bR, tR, tMid, Math.PI/2);    

        // Taket
        const tPeak = { x: (tL.x + tR.x)/2, y: tMid.y - h.h*0.6 };
        ctx.fillStyle = "#f5f5f5";
        ctx.beginPath();
        ctx.moveTo(tL.x, tL.y); ctx.lineTo(tPeak.x, tPeak.y); ctx.lineTo(tMid.x, tMid.y);
        ctx.lineTo(tR.x, tR.y); ctx.lineTo(tBack.x, tBack.y); ctx.lineTo(tPeak.x, tPeak.y);
        ctx.closePath(); ctx.fill(); ctx.stroke();

        if(!clean) {
            ctx.fillStyle = isSel ? "#000" : "#2ed573";
            ctx.beginPath(); ctx.arc(h.x, h.y, 8, 0, 7); ctx.fill();
        }
    });

    if(!clean) {
        ctx.fillStyle = "#ff4757";
        [state.vpL, state.vpR].forEach(v => { ctx.beginPath(); ctx.arc(v.x, v.y, 10, 0, 7); ctx.fill(); });
    }
}

function start(e) {
    const r = canvas.getBoundingClientRect(), mx = e.clientX-r.left, my = e.clientY-r.top;
    activeObj = null;
    [state.vpL, state.vpR].forEach(v => { if(Math.hypot(v.x-mx, v.y-my) < 25) activeObj = v; });
    
    // VÄLJ RÄTT HUS: Kolla de närmaste först vid klick
    const sortedForClick = [...state.houses].sort((a, b) => b.y - a.y);
    for(let h of sortedForClick) {
        if(Math.hypot(h.x-mx, h.y-my) < 25) { activeObj = h; select(h); break; }
    }
    
    if(!activeObj) select(null);
    draw();
}

function move(e) {
    if(!activeObj) return;
    const r = canvas.getBoundingClientRect();
    activeObj.x = e.clientX-r.left; activeObj.y = e.clientY-r.top;
    if(activeObj.isVP) state.vpL.y = state.vpR.y = activeObj.y;
    draw();
}

init();
</script>
</body>
</html>
