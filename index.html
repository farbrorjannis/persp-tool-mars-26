<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist Perspective Tool - Multi-Cottage</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="ui-container">
    <div class="panel info">
        <h1>Perspective Helper</h1>
        <p><span class="dot red"></span> Drag <b>Red Dots</b> for Horizon</p>
        <p><span class="dot green"></span> Click/Drag <b>Green Dots</b> to select & move</p>
        <button id="addHouseBtn">Add New Cottage</button>
    </div>

    <div class="panel settings">
        <h2 id="selectionText">Select a cottage to edit</h2>
        <div class="control">
            <label>Cottage Scale</label>
            <input type="range" id="sizeSlider" min="20" max="250" value="70">
        </div>
        <div class="control">
            <label>Wall Height</label>
            <input type="range" id="heightSlider" min="10" max="200" value="60">
        </div>
        <div class="control">
            <label>Grid Opacity</label>
            <input type="range" id="alphaSlider" min="5" max="100" value="50">
        </div>
    </div>
</div>

<canvas id="perspectiveCanvas"></canvas>

<script src="script.js"></script>
</body>
</html>
